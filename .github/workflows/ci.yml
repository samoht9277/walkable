name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'WalkableKit/**'
      - 'WalkableApp/**'
      - 'WalkableWatch/**'
      - 'WalkableWidgets/**'
      - 'WalkableTests/**'
      - 'WalkableUITests/**'
      - 'project.yml'
      - '.swiftlint.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build-and-test:
    name: Build & Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Build iOS
        run: |
          xcodebuild -project Walkable.xcodeproj \
            -scheme WalkableApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            build | tail -5

      - name: Run Unit Tests
        run: |
          xcodebuild test -project Walkable.xcodeproj \
            -scheme WalkableApp \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -skipPackagePluginValidation \
            -only-testing:WalkableTests | tail -20

      - name: Build watchOS
        run: |
          xcodebuild -project Walkable.xcodeproj \
            -scheme WalkableWatch \
            -destination 'platform=watchOS Simulator,name=Apple Watch Ultra 3 (49mm)' \
            -skipPackagePluginValidation \
            build | tail -5
